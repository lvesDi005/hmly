<!DOCTYPE html>
<script src="js/getParameter.js"></script>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>订单列表</title>
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="css/common.css">
        <link rel="stylesheet" href="css/index.css">
       <style>
           .tab-content .row>div {
            margin-top: 16px;
           } 
           .tab-content {
            margin-bottom: 36px;
           }
       </style>
       <script src="js/jquery-3.3.1.js"></script>

        <script>
            var uid = getParameter("uid");
            var decide = getParameter("cid");
            $(function () {
                load(uid,null,decide);
            })
            function load(uid,currentPage,decide){
                $.get("route/findFavorite",{uid:uid,currentPage:currentPage,decide:decide},function (pb) {
                    //解析pagebean数据，展示到页面上
                    if (pb.totalCount==0){
                        alert("没有订单")
                        location.href="/backTravel/index.html";
                    }
                    /*
                            <li><a href="">首页</a></li>
                            <li class="threeword"><a href="#">上一页</a></li>
                            <li class="curPage"><a href="#">1</a></li>
                            <li><a href="#">2</a></li>
                            <li><a href="#">3</a></li>
                            <li><a href="#">4</a></li>
                            <li><a href="#">5</a></li>
                            <li><a href="#">6</a></li>
                            <li><a href="#">7</a></li>
                            <li><a href="#">8</a></li>
                            <li><a href="#">9</a></li>
                            <li><a href="#">10</a></li>
                            <li class="threeword"><a href="javascript:;">下一页</a></li>
                            <li class="threeword"><a href="javascript:;">末页</a></li>


                     */
                    var lis = "";

                    var fristPage = '<li onclick="javascipt:load(uid,1)"><a href="javascript:void(0)">首页</a></li>';

                    //计算上一页的页码
                    var beforeNum =  pb.currentPage - 1;
                    if(beforeNum <= 0){
                        beforeNum = 1;
                    }

                    var beforePage = '<li  onclick="javascipt:load(uid,'+beforeNum+')" class="threeword"><a href="javascript:void(0)">上一页</a></li>';

                    lis += fristPage;
                    lis += beforePage;
                    //1.2 展示分页页码
                    /*
                        1.一共展示10个页码，能够达到前5后4的效果
                        2.如果前边不够5个，后边补齐10个
                        3.如果后边不足4个，前边补齐10个
                    */

                    // 定义开始位置begin,结束位置 end
                    var begin; // 开始位置
                    var end ; //  结束位置


                    //1.要显示10个页码
                    if(pb.totalPage < 10){
                        //总页码不够10页

                        begin = 1;
                        end = pb.totalPage;
                    }else{
                        //总页码超过10页

                        begin = pb.currentPage - 5 ;
                        end = pb.currentPage + 4 ;

                        //2.如果前边不够5个，后边补齐10个
                        if(begin < 1){
                            begin = 1;
                            end = begin + 9;
                        }

                        //3.如果后边不足4个，前边补齐10个
                        if(end > pb.totalPage){
                            end = pb.totalPage;
                            begin = end - 9 ;
                        }
                    }


                    for (var i = begin; i <= end ; i++) {
                        var li;
                        //判断当前页码是否等于i
                        if(pb.currentPage == i){

                            li = '<li class="curPage" onclick="javascipt:load(uid,'+i+')"><a href="javascript:void(0)">'+i+'</a></li>';

                        }else{
                            //创建页码的li
                            li = '<li onclick="javascipt:load(uid,'+i+')"><a href="javascript:void(0)">'+i+'</a></li>';
                        }
                        //拼接字符串
                        lis += li;
                    }





                    /* for (var i = 1; i <= pb.totalPage ; i++) {
                         var li;
                         //判断当前页码是否等于i
                         if(pb.currentPage == i){

                             li = '<li class="curPage" onclick="javascipt:load('+cid+','+i+')"><a href="javascript:void(0)">'+i+'</a></li>';

                         }else{
                             //创建页码的li
                             li = '<li onclick="javascipt:load('+cid+','+i+')"><a href="javascript:void(0)">'+i+'</a></li>';
                         }
                         //拼接字符串
                         lis += li;
                     }*/
                    var nextNum =  pb.currentPage + 1;
                    if(nextNum >= pb.totalPage){
                        nextNum = pb.totalPage;
                    }
                    var lastPage = '<li onclick="javascipt:load(uid,'+pb.totalPage+')" class="threeword"><a href="javascript:void(0);">末页</a></li>';
                    var nextPage = '<li onclick="javascipt:load(uid,'+nextNum+')" class="threeword"><a href="javascript:void(0);">下一页</a></li>';

                    lis += nextPage;
                    lis += lastPage;


                    //将lis内容设置到 ul
                    $("#yema").html(lis);



                    /*
                        <li>
                            <div class="img"><img src="images/04-search_03.jpg" alt=""></div>
                            <div class="text1">
                                <p>【减100元 含除夕/春节出发】广州增城三英温泉度假酒店/自由行套票</p>
                                <br/>
                                <p>1-2月出发，网付立享￥1099/2人起！爆款位置有限，抢完即止！</p>
                            </div>
                            <div class="price">
                                <p class="price_num">
                                    <span>&yen;</span>
                                    <span>299</span>
                                    <span>起</span>
                                </p>
                                <p><a href="route_detail.html">查看详情</a></p>
                            </div>
                        </li>

                     */

                    //2.列表数据展示
                    var lis = "";
                    for (var i = 0; i < pb.list.length; i++) {
                        //获取{rid:1,rname:"xxx"}
                        var route = pb.list[i];

                        lis+='                              <div class="col-md-3" id="route" >\n' +
                            '                                    <a href="#">\n' +
                            '                                        <img src='+route.rimage+' alt="" style="height: 183px">\n' +
                            '                                        <div class="has_border">\n' +
                            '                                            <h3>'+route.rname+'</h3>\n' +
                            '                                            <div class="price">网付价<em>￥</em><strong>'+route.price+'</strong><em>起</em></div>\n' +
                            '                                            <div class="btn btn-default btn-sm"><a href="deleteorder.html?rid='+route.rid+'">删除</a></div>\n' +
                            '                                        </div>\n' +
                            '                                    </a>\n' +
                            '                                </div>';
                    }
                    $("#route").html(lis);

                    //定位到页面顶部
                    // window.scrollTo(0,0);
                });

            }
        </script>


    </head>
    <body>
    <!--引入头部-->

         <!-- 排行榜 start-->
        <section id="content">
            <section class="hemai_jx">
                <div class="jx_top">
                    <div class="jx_tit">
                        <img src="images/icon_5.jpg" alt="">
                        <span>顾客订单</span>
                    </div>                    
                </div>
                <div class="jx_content">
                    <!-- Tab panes -->
                    <div class="tab-content">
                        <div role="tabpanel" class="tab-pane active" id="home">
                            <div class="row" id="route">
                                <div class="col-md-3" >
                                    <a href="route_detail.html">
                                        <img src="images/collection_pic.jpg" alt="">
                                        <div class="has_border">
                                            <h3>上海直飞三亚5天4晚自由行(春节预售+亲子/蜜月/休闲游首选+豪华酒店任选+接送机)</h3>
                                            <div class="price">网付价<em>￥</em><strong>889</strong><em>起</em></div>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pageNum">
                    <ul id="yema">
                    </ul>
                </div>
            </section>                      
        </section>
        <!-- 排行榜 end-->
    	
         <!--引入尾部-->
    	<div id="footer"></div>
        <!--导入布局js，共享header和footer-->
        <script type="text/javascript" src="js/include.js"></script>
