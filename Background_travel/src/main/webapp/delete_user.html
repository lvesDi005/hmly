<!DOCTYPE html>
<!-- 网页使用的语言 -->
<html lang="zh-CN">
<head>
    <!-- 指定字符集 -->
    <meta charset="utf-8">
    <!-- 使用Edge最新的浏览器的渲染方式 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- viewport视口：网页可以根据设置的宽度自动进行适配，在浏览器的内部虚拟一个容器，容器的宽度与设备的宽度相同。
    width: 默认宽度与设备的宽度相同
    initial-scale: 初始的缩放比，为1:1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 上述3个meta标签*必须*放在最前面，任何其他内容都*必须*跟随其后！ -->
    <title>用户信息管理系统</title>

    <!-- 1. 导入CSS的全局样式 -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <!-- 2. jQuery导入，建议使用1.9以上的版本 -->
    <script src="js/jquery-1.11.0.min.js"></script>
    <!-- 3. 导入bootstrap的js文件 -->
    <script src="js/bootstrap.min.js"></script>
    <script src="js/getParameter.js"></script>
    <script src="js/jquery-3.3.1.js"></script>
    <style type="text/css">
        td, th {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h3 style="text-align: center">用户信息列表</h3>

    <table border="1" class="table table-bordered table-hover" id="table" style="height: 250px;text-align: center">
        <tr class="success">
            <th>姓名</th>
            <th>出生日期</th>
            <th>性别</th>
            <th>联系电话</th>
            <th>邮箱</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        <tr>
            <td>1</td>
            <td>张三</td>
            <td>男</td>
            <td>20</td>
            <td>广东</td>
            <td>44444222</td>
            <td><a class="btn btn-default btn-sm" href="update_user.html">删除</a>
        </tr>

    </table>
    <script>
        $(function () {
            load(null);
        });
        function load(currentPage) {
            //发送ajax请求，请求route/pageQuery,传递cid
            $.get("user/findUserByPage", {currentPage: currentPage}, function (pb) {
                //解析pagebean数据，展示到页面上
                //1.分页工具条数据展示
                var lis = "";
                var fristPage = '<li onclick="javascipt:load(1)"><a href="javascript:void(0)">首页</a></li>';
                //计算上一页的页码
                var beforeNum = pb.currentPage - 1;
                if (beforeNum <= 0) {
                    beforeNum = 1;
                }
                var beforePage = '<li  onclick="javascipt:load(' + beforeNum + ')" class="threeword"><a href="javascript:void(0)">上一页</a></li>';
                lis += fristPage;
                lis += beforePage;
                //1.2 展示分页页码
                /*
                        1.一共展示10个页码，能够达到前5后4的效果
                        2.如果前边不够5个，后边补齐10个
                        3.如果后边不足4个，前边补齐10个
                    */
                // 定义开始位置begin,结束位置 end
                var begin; // 开始位置
                var end; //  结束位置
                //1.要显示10个页码
                if (pb.totalPage < 10) {
                    //总页码不够10页

                    begin = 1;
                    end = pb.totalPage;
                } else {
                    //总页码超过10页

                    begin = pb.currentPage - 5;
                    end = pb.currentPage + 4;

                    //2.如果前边不够5个，后边补齐10个
                    if (begin < 1) {
                        begin = 1;
                        end = begin + 9;
                    }

                    //3.如果后边不足4个，前边补齐10个
                    if (end > pb.totalPage) {
                        end = pb.totalPage;
                        begin = end - 9;
                    }
                }
                for (var i = begin; i <= end; i++) {
                    var li;
                    //判断当前页码是否等于i
                    if (pb.currentPage == i) {

                        li = '<li class="curPage" onclick="javascipt:load(' + i + ')"><a href="javascript:void(0)">' + i + '</a></li>';

                    } else {
                        //创建页码的li
                        li = '<li onclick="javascipt:load(' + i + ')"><a href="javascript:void(0)">' + i + '</a></li>';
                    }
                    //拼接字符串
                    lis += li;
                }
                var lastPage = '<li onclick="javascript:load(' + pb.totalPage + ')" class="threeword"><a href="javascript:;">末页</a></li>';
                //计算下一页的页码
                var nextNum = pb.currentPage + 1;
                if (nextNum >= pb.totalPage) {
                    nextNum = pb.totalPage;
                }
                var nextPage = '<li onclick="javascript:load(' + nextNum + ')" class="threeword"><a href="javascript:;">下一页</a></li>';
                lis += nextPage;
                lis += lastPage;
                //将lis内容设置到 ul
                $("#pageNum").html(lis);


                //2.列表数据展示
                var lis='';
                var lislis='<tr class="success">\n' +
                    '            <th>姓名</th>\n' +
                    '            <th>出生日期</th>\n' +
                    '            <th>性别</th>\n' +
                    '            <th>联系电话</th>\n' +
                    '            <th>邮箱</th>\n' +
                    '            <th>状态</th>\n' +
                    '            <th>操作</th>\n' +
                    '        </tr>';
                lis+=lislis;
                for (var i = 0; i <pb.list.length ;i++) {
                    var user = pb.list[i];
                    lis+='<tr>\n' +
                        '            <td>'+user.name+'</td>\n' +
                        '            <td>'+user.birthday+'</td>\n' +
                        '            <td>'+user.sex+'</td>\n' +
                        '            <td>'+user.telephone+'</td>\n' +
                        '            <td>'+user.email+'</td>\n' +
                        '            <td>'+user.status+'</td>\n' +
                        '            <td><a id="deleteuser" class="btn btn-default btn-sm" href="deletetheuser.html?username='+user.username+'");">删除</a>\n' +
                        '        </tr>';
                }
                $("#table").html(lis);
                //定位到页面顶部
                window.scrollTo(0, 0);

            });
        }
    </script>
</div>
</body>
</html>
