<!DOCTYPE html>
<!-- 网页使用的语言 -->
<html lang="zh-CN">
    <head>
    	<base href="<%=basePath%>"/>
        <!-- 指定字符集 -->
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>修改用户</title>

        <link href="css/bootstrap.min.css" rel="stylesheet">
        <script src="js/jquery-2.1.0.min.js"></script>
        <script src="js/bootstrap.min.js"></script>
        <script src="js/jquery-3.3.1.js"></script>
        <script src="js/getParameter.js"></script>
        
    </head>
    <body>
        <div class="container" style="width: 400px;">
        <h3 style="text-align: center;">修改用户</h3>
            <form role="form" class="form-horizontal m-t" id="form" action="javascript:void(0)" method="post">
                <div class="form-group draggable">
                    <div class="col-sm-9">
                        <span style="color: red;font-size: large" id="infof"></span>
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">账户</label>
                    <div class="col-sm-9">
                        <input type="text" name="username" class="form-control"  placeholder="请输入用户名" id="username">
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">密码</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" name="password" placeholder="请输入密码" id="password">
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">姓名</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" name="name" placeholder="请输入姓名" readonly="readonly" id="name">
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">出生年月</label>
                    <div class="col-sm-9">
                        <input type="date" class="form-control" name="birthday" placeholder="年/月/日" id="birthday">
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">性别</label>
                    <div class="col-sm-9" id="sex">
                        <input type="radio" name="sex" value="男" id="nan"> 男
                        <input type="radio" name="sex" value="女 " id="nv"> 女
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">电话</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" name="telephone" placeholder="请输入电话" id="tel">
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">邮箱</label>
                    <div class="col-sm-9">
                        <input type="email" class="form-control" name="email" placeholder="请输入邮箱" id="email">
                    </div>
                </div>
                <div class="form-group draggable">
                    <label class="col-sm-3 control-label">状态</label>
                    <div class="col-sm-9" id="status">
                        <input type="radio" name="status" value="Y" checked>Y
                        <input type="radio" name="status" value="N">N
                    </div>
                </div>

                <div class="form-group draggable">
                    <div class="col-sm-9" style="text-align: center">
                        <input type="submit" value="提交" id="submit">
                    </div>
                </div>
            </form>
        </div>
    </body>
<script>
    $(function () {
       var uid = getParameter("uid");
       var sex="";
       var stu="";
        $.post("user/findOnlyUser",{uid:uid},function (user) {
            $("#uid").val(uid);
            $("#name").val(user.name);
            $("#username").val(user.username);
            $("#password").val(user.password);
            $("#birthday").val(user.birthday);
            if (user.sex=='男'){
                sex=' <input type="radio" name="sex" value="男" id="nan" checked> 男\n' +
                    ' <input type="radio" name="sex" value="女 " id="nv"> 女';
            }else {
                sex=' <input type="radio" name="sex" value="男" id="nan" > 男\n' +
                    ' <input type="radio" name="sex" value="女 " id="nv" checked> 女';
            }
            $("#sex").html(sex);
            $("#tel").val(user.telephone);
            $("#email").val(user.email);
            if (user.status=='Y'){
                stu='<input type="radio" name="status" value="Y" checked>Y\n' +
                    '<input type="radio" name="status" value="N">N';
            }else {
                stu='<input type="radio" name="status" value="Y" >Y\n' +
                    '<input type="radio" name="status" value="N" checked>N';
            }
            $("#status").html(stu);
        });

        //当表单提交时，调用所有的校验方法
        $("#form").submit(function () {
            //发送数据到服务器
                //校验通过，发送ajax请求，提交表单的数据
                //serialize()序列化表单内容，将数据转换成key=value
                //this指的是registerForm，但是this是js对象，所以需要转换成jquery对象
                $.post("user/updateUser",$(this).serialize(),function (data) {
                    //处理服务器响应的数据data
                    if (data.flag){
                        //注册成功，跳转成功页面
                        alert("修改成功！")
                        location.href="/backTravel/change_user.html"
                    }else {
                        //注册失败
                        $("#errorMsg").html(data.errorMsg);
                    }

                });
        });

    })

</script>
</html>
